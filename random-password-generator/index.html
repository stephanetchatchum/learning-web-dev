<!DOCTYPE html><!-- this line tells the browser the version of html we are using -->
<html lang="en"><!-- this attribut specifies the language -->
<head>
    <meta charset="UTF-8"><!-- sets the character set for the page -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0"><!-- helps display the page to fit the screen properly-->
    <title>Password Generator</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="password-container">
        <h2>Random Password Generator</h2>
        <div class="input-container">
            <input type="text" id="input" class="input" placeholder="Create Password" readonly>
            <i class="fa-regular fa-copy fa-2x"></i>
        </div>
        <button class="btn">Generate</button>
    </div>
    <div class="alert-container active">Password Copied</div>
    <script src="script.js"></script>
</body>
</html>
